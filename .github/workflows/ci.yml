name: CI
on:
  pull_request:
    branches: [master]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci --legacy-peer-deps
      - name: build
        run: npm run build
      - name: test
        run: echo "no test suite configured"
